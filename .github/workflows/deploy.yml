name: Deploy Quartz site to GitHub Pages

# Renders the public wiki to a Quartz (v5) static site and publishes it to
# GitHub Pages. Source-of-truth stays [[wikilinks]]; Quartz resolves them at
# build time.
#
# Cost: Actions minutes are free + unlimited for public repos, so this is $0.
#
# ONE-TIME SETUP (cannot be done from CI): in the repo on GitHub, go to
#   Settings → Pages → Build and deployment → Source → "GitHub Actions".
# After that, every push to main rebuilds and redeploys automatically.
# Site URL: https://jadams5.github.io/aging_wiki/
#
# v5 notes: config is a single quartz.config.yaml (copied from upstream's
# default, then overlaid by scripts/quartz-config-patch.py). Components are
# fetched from github:quartz-community/* via `quartz plugin install` (pinned by
# Quartz's quartz.lock.json). The graph idle-CPU is inherent to Quartz's render
# loop (v4 and v5 alike) — config only trims the settle phase.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress publish.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout wiki content
        uses: actions/checkout@v4
        with:
          path: wiki
          # Full history so Quartz can derive created/modified dates from git.
          fetch-depth: 0

      - name: Checkout Quartz (v5)
        uses: actions/checkout@v4
        with:
          repository: jackyzha0/quartz
          ref: v5
          path: quartz

      - name: Configure Quartz (title + baseUrl + graph)
        run: |
          cd quartz
          cp quartz.config.default.yaml quartz.config.yaml
          BASE="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]').github.io/${{ github.event.repository.name }}"
          python3 -c "import yaml" 2>/dev/null || pip install --break-system-packages --quiet pyyaml
          python3 ../wiki/scripts/quartz-config-patch.py quartz.config.yaml "$BASE"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: quartz
        run: npm ci

      - name: Install Quartz plugins (pinned by lockfile)
        working-directory: quartz
        run: npx quartz plugin install

      - name: Sync public content into Quartz
        run: |
          rm -rf quartz/content
          mkdir -p quartz/content
          # Copy the public wiki into Quartz's content dir. Excludes:
          #  - protocols / protocols-template : private + meta scaffolding
          #  - tooling/config dirs            : not wiki content
          #  - CLAUDE.local.md                : git-ignored private layer (belt-and-suspenders)
          rsync -a \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.obsidian' \
            --exclude '.claude' \
            --exclude '.agents' \
            --exclude '.codex' \
            --exclude 'protocols' \
            --exclude 'protocols-template' \
            --exclude 'CLAUDE.local.md' \
            wiki/ quartz/content/
          echo "Pages to render: $(find quartz/content -name '*.md' | wc -l)"

      - name: Set custom favicon
        # Quartz's source static dir is quartz/quartz/static (the repo is
        # checked out to quartz/, and its source lives in a nested quartz/).
        run: cp wiki/sources/branding/icon.png quartz/quartz/static/icon.png

      - name: Apply custom styles
        # Append our overrides to Quartz's custom.scss hook (keeps its leading
        # @use). Hides tag chips in folder/page listings — see the file's notes.
        run: cat wiki/sources/branding/custom.scss >> quartz/quartz/styles/custom.scss

      - name: Build site
        working-directory: quartz
        run: npx quartz build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: quartz/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
